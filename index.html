<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { 
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0f1419;
    color: #e5e7eb;
    min-height: 100vh;
    -webkit-user-select: none;
    user-select: none;
}

.container { max-width: 500px; margin: 0 auto; padding: 16px; padding-bottom: 90px; }

/* AUTH SCREEN */
.auth-screen {
position: fixed;
inset: 0;
background: #0f1419;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 200;
padding: 20px;
}
.auth-screen.hidden { display: none; }
.auth-logo {
font-size: 48px;
margin-bottom: 16px;
}
.auth-title {
font-size: 24px;
font-weight: 700;
margin-bottom: 8px;
color: #f9fafb;
}
.auth-subtitle {
font-size: 14px;
color: #6b7280;
text-align: center;
margin-bottom: 32px;
}
.google-btn {
background: #fff;
color: #1f2937;
border: none;
padding: 14px 24px;
border-radius: 8px;
font-weight: 600;
font-size: 15px;
cursor: pointer;
display: flex;
align-items: center;
gap: 10px;
font-family: inherit;
}
.google-btn:active { transform: scale(0.98); }
.google-btn img { width: 20px; height: 20px; }

/* REST OF STYLES */
.header {
margin-bottom: 20px;
padding-bottom: 16px;
border-bottom: 1px solid #1f2937;
display: flex;
justify-content: space-between;
align-items: flex-start;
}
.header-left h1 {
font-size: 22px;
font-weight: 700;
color: #f9fafb;
margin-bottom: 4px;
}
.header-sub { color: #6b7280; font-size: 13px; font-weight: 500; }
.header-right {
display: flex;
flex-direction: column;
align-items: flex-end;
gap: 4px;
}
.sync-status {
font-size: 10px;
color: #6b7280;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.5px;
}
.sync-status.synced { color: #00e676; }
.user-email {
font-size: 11px;
color: #6b7280;
}
.logout-btn {
font-size: 11px;
color: #ef4444;
background: none;
border: none;
cursor: pointer;
padding: 0;
font-weight: 600;
margin-top: 4px;
}

.stats-bar {
display: grid;
grid-template-columns: 1fr 1fr 1fr;
gap: 8px;
margin-bottom: 20px;
}
.stat-box {
background: #1a212b;
border: 1px solid #1f2937;
border-radius: 8px;
padding: 14px 10px;
text-align: center;
}
.stat-number {
font-size: 22px;
font-weight: 700;
color: #00e676;
line-height: 1;
}
.stat-label {
font-size: 11px;
color: #6b7280;
font-weight: 500;
margin-top: 4px;
}

.workout-progress {
background: #1a212b;
border: 1px solid #1f2937;
border-radius: 8px;
padding: 12px 14px;
margin-bottom: 16px;
display: flex;
align-items: center;
gap: 12px;
}
.workout-progress-text {
font-size: 13px;
color: #9ca3af;
font-weight: 600;
white-space: nowrap;
}
.progress-bar {
flex: 1;
height: 6px;
background: #0f1419;
border-radius: 3px;
overflow: hidden;
}
.progress-bar-fill {
height: 100%;
background: #00e676;
border-radius: 3px;
transition: width 0.4s ease-out;
}

.bottom-nav {
position: fixed;
bottom: 0;
left: 0;
right: 0;
background: #1a212b;
border-top: 1px solid #1f2937;
padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
z-index: 50;
display: flex;
justify-content: space-around;
max-width: 500px;
margin: 0 auto;
}
.nav-btn {
flex: 1;
border: none;
background: transparent;
color: #6b7280;
cursor: pointer;
padding: 8px 4px;
border-radius: 8px;
font-weight: 600;
font-size: 11px;
font-family: inherit;
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
transition: all 0.15s;
}
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn.active {
color: #00e676;
}
.nav-btn.active svg {
filter: drop-shadow(0 0 8px rgba(0, 230, 118, 0.4));
}

.tab-content { display: none; }
.tab-content.active { display: block; }

.section { margin-bottom: 20px; }
.section-title {
font-size: 16px;
font-weight: 700;
margin-bottom: 14px;
color: #f9fafb;
}

.exercise-card {
background: #1a212b;
border: 1px solid #1f2937;
border-radius: 10px;
margin-bottom: 10px;
}
.exercise-card-compact {
padding: 14px 16px;
display: flex;
justify-content: space-between;
align-items: center;
cursor: pointer;
gap: 12px;
}
.exercise-card-compact-info { flex: 1; min-width: 0; }
.exercise-card-compact-name {
font-weight: 600;
font-size: 15px;
color: #f9fafb;
margin-bottom: 2px;
}
.exercise-card-compact-meta {
font-size: 12px;
color: #00e676;
font-weight: 600;
}
.exercise-num {
font-size: 11px;
color: #6b7280;
font-weight: 700;
background: #0f1419;
padding: 4px 8px;
border-radius: 6px;
border: 1px solid #1f2937;
}

.btn {
border: none;
cursor: pointer;
font-family: inherit;
font-weight: 600;
transition: all 0.15s;
}
.btn-primary {
background: #00e676;
color: #0f1419;
padding: 14px 20px;
font-size: 15px;
border-radius: 8px;
width: 100%;
}
.btn-primary:active { transform: scale(0.98); }

.empty-state {
text-align: center;
padding: 50px 20px;
color: #6b7280;
}

.success {
background: rgba(0, 230, 118, 0.1);
color: #00e676;
padding: 10px 14px;
border-radius: 6px;
margin-bottom: 12px;
font-size: 13px;
font-weight: 600;
border: 1px solid rgba(0, 230, 118, 0.15);
text-align: center;
}

.save-indicator {
position: fixed;
top: 16px;
right: 16px;
background: rgba(0, 230, 118, 0.1);
color: #00e676;
padding: 6px 12px;
border-radius: 6px;
font-size: 11px;
font-weight: 700;
border: 1px solid rgba(0, 230, 118, 0.2);
display: none;
z-index: 98;
}
.save-indicator.show { display: block; animation: saveFlash 1.5s ease-out; }
@keyframes saveFlash {
0% { opacity: 0; transform: translateY(-10px); }
15% { opacity: 1; transform: translateY(0); }
85% { opacity: 1; }
100% { opacity: 0; }
}
</style>

</head>

let app, auth, db;
let currentUser = null;
let data = JSON.parse(JSON.stringify(INITIAL_DATA));

// Initialize Firebase
try {
    app = firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    db = firebase.firestore();
    console.log('Firebase initialized');
} catch (e) {
    console.error('Firebase init error:', e);
}

// Set up auth listener
auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        console.log('User signed in:', user.email);
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('mainContainer').style.display = 'block';
        document.getElementById('bottomNav').style.display = 'flex';
        document.getElementById('userEmail').textContent = user.email;
    } else {
        currentUser = null;
        console.log('User signed out');
        document.getElementById('authScreen').classList.remove('hidden');
        document.getElementById('mainContainer').style.display = 'none';
        document.getElementById('bottomNav').style.display = 'none';
    }
});

// Sign in button
document.getElementById('googleSignInBtn').addEventListener('click', function(e) {
    e.preventDefault();
    console.log('Sign in clicked');
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider)
        .then(result => {
            console.log('Sign in success:', result.user.email);
        })
        .catch(error => {
            console.error('Sign in error:', error);
            alert('Sign in failed: ' + error.message);
        });
});

document.getElementById('logoutBtn').addEventListener('click', function() {
    auth.signOut().then(() => {
        console.log('Signed out');
    }).catch(err => console.error(err));
});
